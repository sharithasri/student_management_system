<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Management System</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<header>
<h1>🎓 Student Management System</h1>

<nav>
<a href="#">Home</a>
<a href="#">Add Student</a>
<a href="#">Students</a>
</nav>

</header>


<section class="hero">

<h2>Manage Student Records Easily</h2>
<p>Add, view and manage students with a modern interface</p>

</section>


<section class="form-section">

<h2>Add Student</h2>

<form id="studentForm">

<input type="text" id="name" placeholder="Student Name" required>

<input type="number" id="age" placeholder="Age" required>

<input type="text" id="course" placeholder="Course" required>

<button type="submit">Add Student</button>

</form>

</section>


<section class="students-container">

<h2>Students List</h2>
<h3 id="totalStudents"></h3>
<input type="text" id="searchStudent" placeholder="Search Student..." />

<div id="studentList" class="student-grid"></div>

</section>
<section class="dashboard">

<h2>Student Analytics</h2>

<canvas id="studentChart" width="400" height="200"></canvas>

</section>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="js/script.js"></script>

</body>
</html>
